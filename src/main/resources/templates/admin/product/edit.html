<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Edit Product</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<h2>Edit Product</h2>

<form th:action="@{/admin/products/{id}(id=${product.id})}" th:object="${product}" method="post">

    <label for="name">Name:</label>
    <input type="text" id="name" th:field="*{name}" required/><br/><br/>

    <label for="price">Price:</label>
    <input type="number" id="price" th:field="*{price}" step="0.01" required/><br/><br/>

    <label for="description">Description:</label>
    <textarea id="description" th:field="*{description}" rows="4" cols="50"></textarea><br/><br/>

    <label for="category">Category:</label>
    <select id="category" th:field="*{category}">
        <option th:each="c : ${categories}" th:value="${c}" th:text="${c}"></option>
    </select><br/><br/>

    <label for="imageUrl">Image URL:</label>
    <input type="text" id="imageUrl" th:field="*{imageUrl}" placeholder="/images/img001.png"/><br/><br/>

    <button type="submit">Save Changes</button>
</form>

<br/>
<a href="/admin/products">Back to Products</a>

</body>
</html>
