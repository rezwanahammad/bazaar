<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product | Bazaar Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="fragments/admin-sidebar :: sidebar('products')"></div>

<div class="admin-content">

    <div class="admin-topbar">
        <h1>Add Product</h1>
        <span class="admin-topbar-meta">Create a new product listing</span>
    </div>

    <div class="admin-body">

        <a th:href="@{/admin/products}" class="admin-back-link">&#8592; Back to Products</a>

        <div class="admin-form-wrap">
            <form th:action="@{/admin/products}" method="post" th:object="${product}" enctype="multipart/form-data">

                <div class="admin-form-group">
                    <label for="name">Product Name</label>
                    <input type="text" id="name" th:field="*{name}" placeholder="e.g. Oversized Black Tee" required/>
                </div>

                <div class="admin-form-group">
                    <label for="description">Description</label>
                    <textarea id="description" th:field="*{description}" placeholder="Product description..."></textarea>
                </div>

                <div class="admin-form-group">
                    <label for="price">Price (৳)</label>
                    <input type="number" id="price" step="0.01" th:field="*{price}" placeholder="0.00" required/>
                </div>

                <div class="admin-form-group">
                    <label for="stockQuantity">Stock Quantity</label>
                    <input type="number" id="stockQuantity" th:field="*{stockQuantity}" placeholder="0"/>
                </div>

                <div class="admin-form-group">
                    <label for="brand">Brand</label>
                    <input type="text" id="brand" th:field="*{brand}" placeholder="Brand name"/>
                </div>

                <div class="admin-form-group">
                    <label for="imageFile">Upload Product Image</label>
                    <input type="file" id="imageFile" name="imageFile" accept="image/*"/>
                    <small class="admin-field-help">If Cloudinary is configured, this file will be uploaded and its URL will be saved automatically.</small>
                </div>

                <div class="admin-form-group">
                    <label for="imageUrl">Image URL Fallback</label>
                    <input type="text" id="imageUrl" th:field="*{imageUrl}" placeholder="https://res.cloudinary.com/... or other image URL" autocomplete="off"/>
                    <small class="admin-field-help">Optional. Use this only if you already have an image URL.</small>
                </div>

                <div class="admin-form-group">
                    <label for="category">Category</label>
                    <select id="category" th:field="*{category}">
                        <option value="">-- Select Category --</option>
                        <option th:each="c : ${categories}" th:value="${c}" th:text="${c}"></option>
                    </select>
                </div>

                <div class="admin-form-actions">
                    <button type="submit" class="admin-btn admin-btn-primary">Create Product</button>
                    <a th:href="@{/admin/products}" class="admin-btn admin-btn-neutral">Cancel</a>
                </div>

            </form>
        </div>

    </div>

    <div th:replace="fragments/footer :: siteFooter"></div>
</div>

</body>
</html>
