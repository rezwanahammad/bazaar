<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Product | Bazaar Seller</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="fragments/seller-sidebar :: sellerSidebar('products')"></div>

<div class="admin-content">

    <div class="admin-topbar">
        <h1>Edit Product</h1>
        <span class="admin-topbar-meta" th:text="'Editing: ' + ${product.name}"></span>
    </div>

    <div class="admin-body">

        <a th:href="@{/seller/products}" class="admin-back-link">&#8592; Back to My Products</a>

        <div class="admin-form-wrap">
            <form th:action="@{/seller/products/{id}(id=${product.id})}" th:object="${product}" method="post" enctype="multipart/form-data">

                <div class="admin-form-group">
                    <label for="name">Product Name</label>
                    <input type="text" id="name" th:field="*{name}" required/>
                </div>

                <div class="admin-form-group">
                    <label for="description">Description</label>
                    <textarea id="description" th:field="*{description}"></textarea>
                </div>

                <div class="admin-form-group">
                    <label for="price">Price (৳)</label>
                    <input type="number" id="price" th:field="*{price}" step="0.01" required/>
                </div>

                <div class="admin-form-group">
                    <label for="stockQuantity">Stock Quantity</label>
                    <input type="number" id="stockQuantity" th:field="*{stockQuantity}" placeholder="0"/>
                </div>

                <div class="admin-form-group">
                    <label for="brand">Brand</label>
                    <input type="text" id="brand" th:field="*{brand}" placeholder="Brand name"/>
                </div>

                <div class="admin-form-group">
                    <label for="category">Category</label>
                    <select id="category" th:field="*{category}">
                        <option th:each="c : ${categories}" th:value="${c}" th:text="${c}"></option>
                    </select>
                </div>

                <div class="admin-form-group">
                    <label for="imageFile">Replace Product Image</label>
                    <input type="file" id="imageFile" name="imageFile" accept="image/*"/>
                    <small class="admin-field-help">Upload a new file to replace the current product image.</small>
                </div>

                <div class="admin-form-group" th:if="${product.imageUrl != null and !#strings.isEmpty(product.imageUrl)}">
                    <label>Current Image</label>
                    <img th:src="${product.imageUrl}" th:alt="${product.name}" class="admin-current-image">
                </div>

                <div class="admin-form-group">
                    <label for="imageUrl">Image URL Fallback</label>
                    <input type="text" id="imageUrl" th:field="*{imageUrl}" placeholder="https://... or other image URL" autocomplete="off"/>
                    <small class="admin-field-help">If you do not upload a file, this URL will be used instead.</small>
                </div>

                <div class="admin-form-actions">
                    <button type="submit" class="admin-btn admin-btn-primary">Save Changes</button>
                    <a th:href="@{/seller/products}" class="admin-btn admin-btn-neutral">Cancel</a>
                </div>

            </form>
        </div>

    </div>

    <div th:replace="fragments/footer :: siteFooter"></div>
</div>

</body>
</html>
