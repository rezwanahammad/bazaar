<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error | Bazaar</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

    <!-- Navbar -->
    <div th:replace="fragments/navbar :: navbar"></div>

    <main class="home-main">
        <section class="home-hero" style="min-height: 60vh; display:flex; align-items:center; justify-content:center;">

            <div class="home-hero-overlay"></div>

            <div class="home-hero-content" style="text-align:center;">
                <h1 style="font-size: 48px;">⚠️ Oops!</h1>

                <p class="home-subtitle">
                    Sorry, an error occurred
                </p>

                <p class="home-subtitle" style="margin-top:10px;">
                    Not what you were looking for?
                </p>

                <div class="home-cta-row" style="margin-top:20px;">
                    <a th:href="@{/}" class="home-btn home-btn-primary">Go Home</a>
                </div>
            </div>

        </section>
    </main>

    <!-- Footer -->
    <div th:replace="fragments/footer :: siteFooter"></div>

</body>
</html>
