<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Register | Bazaar</title>
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<main class="auth-page auth-register-page">
	<section class="auth-shell">
		<div class="auth-intro auth-intro-register">
			<p class="auth-kicker">Create Account</p>
			<h1>Join Bazaar Today</h1>
			<p>Set up your account to save products, manage cart items, and place orders quickly.</p>
		</div>

		<div class="auth-card auth-card-wide">
			<h2>Register</h2>
			<p>Please fill in your information below.</p>

			<form th:action="@{/register}" method="post" th:object="${user}" class="auth-form auth-form-grid">
				<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

				<div class="auth-field">
					<label for="email">Email</label>
					<input id="email" type="email" th:field="*{email}" autocomplete="email" required>
				</div>

				<div class="auth-field">
					<label for="fullName">Name</label>
					<input id="fullName" type="text" th:field="*{fullName}" autocomplete="name" required>
				</div>

				<div class="auth-field">
					<label for="password">Password</label>
					<input id="password" type="password" th:field="*{password}" autocomplete="new-password" required>
				</div>

				<div class="auth-field">
					<label for="phone">Phone</label>
					<input id="phone" type="text" th:field="*{phone}" autocomplete="tel" required>
				</div>

				<div class="auth-field auth-field-full">
					<label for="address">Address</label>
					<textarea id="address" rows="3" th:field="*{address}" required></textarea>
				</div>

				<div class="auth-field auth-field-full">
					<label for="billingAddress">Billing Address</label>
					<textarea id="billingAddress" rows="3" th:field="*{billingAddress}" required></textarea>
				</div>

				<button type="submit" class="auth-submit-btn auth-submit-wide">Create Account</button>
			</form>

			<p class="auth-switch-line">Already have an account? <a th:href="@{/login}">Login</a></p>
		</div>
	</section>
</main>

<div th:replace="fragments/footer :: siteFooter"></div>

</body>
</html>
