services:
  postgres:
    image: postgres:16
    container_name: bazaar-postgres
    restart: always
    environment:
      POSTGRES_DB: bazaar_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 2107072
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  bazaar-app:
    build: .
    container_name: bazaar-app
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bazaar_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 2107072
    restart: always

volumes:
  postgres_data: